<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00A651">
    <title>YANGO Driver Tracker - Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .section { display: none; }
        .section.active { display: block; }
        .metric-value { font-size: 1.85rem; font-weight: 700; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center px-6 bg-zinc-900">
        <div class="w-full max-w-sm bg-zinc-800 border border-zinc-700 rounded-3xl p-7">
            <div class="flex justify-center mb-6">
                <div class="flex items-center gap-x-3">
                    <div class="w-11 h-11 bg-[#00A651] rounded-2xl flex items-center justify-center">
                        <i class="fa-solid fa-car text-white text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-3xl font-bold tracking-tighter">YANGO</h1>
                        <p class="text-xs text-zinc-400 -mt-1">Driver • Cameroon</p>
                    </div>
                </div>
            </div>

            <div class="flex mb-5 border-b border-zinc-700">
                <div onclick="switchTab('login')" id="tab-login" 
                     class="flex-1 text-center py-2 font-medium cursor-pointer border-b-2 border-[#00A651] text-[#00A651]">Login</div>
                <div onclick="switchTab('signup')" id="tab-signup" 
                     class="flex-1 text-center py-2 font-medium cursor-pointer text-zinc-400">Sign Up</div>
            </div>

            <!-- Login Form -->
            <form id="login-form" onsubmit="login(event)">
                <div class="mb-4">
                    <label class="text-xs text-zinc-400">USERNAME</label>
                    <input type="text" id="login-username" required class="w-full mt-1 px-4 py-3 bg-zinc-900 border border-zinc-700 rounded-2xl text-sm">
                </div>
                <div class="mb-6">
                    <label class="text-xs text-zinc-400">PASSWORD</label>
                    <input type="password" id="login-password" required class="w-full mt-1 px-4 py-3 bg-zinc-900 border border-zinc-700 rounded-2xl text-sm">
                </div>
                <button type="submit" class="w-full py-3 bg-[#00A651] hover:bg-emerald-600 transition-colors font-semibold rounded-2xl">Login</button>
                <div id="login-error" class="hidden mt-3 text-red-400 text-sm text-center"></div>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" onsubmit="signup(event)" class="hidden">
                <div class="mb-4">
                    <label class="text-xs text-zinc-400">USERNAME</label>
                    <input type="text" id="signup-username" required class="w-full mt-1 px-4 py-3 bg-zinc-900 border border-zinc-700 rounded-2xl text-sm">
                </div>
                <div class="mb-4">
                    <label class="text-xs text-zinc-400">PASSWORD</label>
                    <input type="password" id="signup-password" required class="w-full mt-1 px-4 py-3 bg-zinc-900 border border-zinc-700 rounded-2xl text-sm">
                </div>
                <div class="mb-6">
                    <label class="text-xs text-zinc-400">CONFIRM PASSWORD</label>
                    <input type="password" id="signup-confirm" required class="w-full mt-1 px-4 py-3 bg-zinc-900 border border-zinc-700 rounded-2xl text-sm">
                </div>
                <button type="submit" class="w-full py-3 bg-[#00A651] hover:bg-emerald-600 transition-colors font-semibold rounded-2xl">Create Account</button>
            </form>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="hidden max-w-[480px] mx-auto min-h-screen bg-zinc-900">
        
        <!-- Header -->
        <div class="px-4 py-4 flex items-center justify-between border-b border-zinc-800">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-[#00A651] rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-car text-white"></i>
                </div>
                <div>
                    <span class="font-bold text-xl">YANGO</span>
                </div>
            </div>
            <div onclick="showProfile()" class="cursor-pointer px-3 py-1.5 bg-zinc-800 rounded-3xl text-sm flex items-center gap-x-2">
                <span id="username-display"></span>
                <i class="fa-solid fa-user text-xs"></i>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="section active px-4 pt-5">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <p class="text-xs text-zinc-400">Today • <span id="today-date"></span></p>
                    <h2 class="text-2xl font-semibold">Good morning</h2>
                </div>
                <button onclick="showSection('add-income')" class="px-4 py-2 bg-[#00A651] text-sm font-semibold rounded-3xl flex items-center gap-x-2">
                    <i class="fa-solid fa-plus"></i> <span>Add</span>
                </button>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-zinc-800 p-4 rounded-3xl">
                    <div class="flex items-center gap-x-2 text-emerald-400 text-xs"><i class="fa-solid fa-taxi"></i> YANGO DIRECT</div>
                    <div id="today-yango" class="metric-value text-emerald-400">0</div>
                </div>
                <div class="bg-zinc-800 p-4 rounded-3xl">
                    <div class="flex items-center gap-x-2 text-blue-400 text-xs"><i class="fa-solid fa-user"></i> PERSONAL</div>
                    <div id="today-personal" class="metric-value text-blue-400">0</div>
                </div>
            </div>

            <div class="bg-zinc-800 p-4 rounded-3xl mb-6">
                <div class="flex justify-between">
                    <div>
                        <div class="text-xs text-zinc-400">NET TODAY</div>
                        <div id="today-net" class="text-3xl font-bold">0</div>
                    </div>
                    <div class="text-right">
                        <div class="text-xs text-zinc-400">Expenses</div>
                        <div id="today-expenses" class="font-semibold text-red-400">0 XAF</div>
                    </div>
                </div>
            </div>

            <div class="flex justify-between text-sm px-1 mb-2">
                <span class="font-medium">This Week</span>
                <span onclick="showSection('reports')" class="text-[#00A651] text-xs cursor-pointer">View Reports →</span>
            </div>

            <div class="grid grid-cols-3 gap-2 mb-6">
                <div class="bg-zinc-800 p-3 rounded-3xl text-center">
                    <div id="week-total" class="font-semibold">0</div>
                    <div class="text-xs text-zinc-400">Income</div>
                </div>
                <div class="bg-zinc-800 p-3 rounded-3xl text-center">
                    <div id="week-expenses" class="font-semibold">0</div>
                    <div class="text-xs text-zinc-400">Expenses</div>
                </div>
                <div class="bg-zinc-800 p-3 rounded-3xl text-center">
                    <div id="week-net" class="font-semibold text-emerald-400">0</div>
                    <div class="text-xs text-zinc-400">Net</div>
                </div>
            </div>

            <div onclick="showSection('multiple-days')" class="cursor-pointer flex justify-between items-center px-4 py-3 bg-zinc-800 rounded-3xl">
                <div class="flex items-center gap-x-3">
                    <i class="fa-solid fa-calendar-days text-zinc-400"></i>
                    <span>Multiple Days View</span>
                </div>
                <i class="fa-solid fa-chevron-right text-zinc-400"></i>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="fixed bottom-0 left-0 right-0 max-w-[480px] mx-auto bg-zinc-900 border-t border-zinc-700 px-2 py-2 flex justify-around">
            <div onclick="showSection('dashboard')" class="cursor-pointer text-center px-5 py-1 text-xs">
                <i class="fa-solid fa-home text-xl"></i><br><span class="text-[10px]">Home</span>
            </div>
            <div onclick="showSection('add-income')" class="cursor-pointer text-center px-5 py-1 text-xs">
                <i class="fa-solid fa-plus-circle text-xl text-[#00A651]"></i><br><span class="text-[10px]">Income</span>
            </div>
            <div onclick="showSection('add-expense')" class="cursor-pointer text-center px-5 py-1 text-xs">
                <i class="fa-solid fa-minus-circle text-xl text-red-400"></i><br><span class="text-[10px]">Expense</span>
            </div>
            <div onclick="showSection('reports')" class="cursor-pointer text-center px-5 py-1 text-xs">
                <i class="fa-solid fa-chart-bar text-xl"></i><br><span class="text-[10px]">Reports</span>
            </div>
        </div>
    </div>

    <script>
        // ==================== SECURE UTILITIES ====================
        
        // Simple client-side password hashing (better than plain text)
        function hashPassword(password) {
            let hash = 0;
            for (let i = 0; i < password.length; i++) {
                const char = password.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return hash.toString(16);
        }

        // Input sanitization
        function sanitizeInput(input) {
            if (!input) return '';
            return input
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;')
                .trim();
        }

        // Validate imported data
        function validateImportData(data) {
            if (!data || typeof data !== 'object') return false;
            if (!Array.isArray(data.entries)) return false;
            
            // Check each entry has required fields
            for (const entry of data.entries) {
                if (!entry.id || !entry.type || !entry.amount || !entry.date) {
                    return false;
                }
            }
            return true;
        }

        // ==================== SECURITY: Login Rate Limiting ====================
        let loginAttempts = 0;
        let isLocked = false;
        const MAX_ATTEMPTS = 5;
        const LOCK_TIME = 30000; // 30 seconds

        function resetLoginAttempts() {
            loginAttempts = 0;
            isLocked = false;
        }

        // ==================== AUTH SYSTEM ====================
        function switchTab(tab) {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const tabLogin = document.getElementById('tab-login');
            const tabSignup = document.getElementById('tab-signup');

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                tabLogin.classList.add('border-b-2', 'border-[#00A651]', 'text-[#00A651]');
                tabLogin.classList.remove('text-zinc-400');
                tabSignup.classList.remove('border-b-2', 'border-[#00A651]', 'text-[#00A651]');
                tabSignup.classList.add('text-zinc-400');
            } else {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                tabSignup.classList.add('border-b-2', 'border-[#00A651]', 'text-[#00A651]');
                tabSignup.classList.remove('text-zinc-400');
                tabLogin.classList.remove('border-b-2', 'border-[#00A651]', 'text-[#00A651]');
                tabLogin.classList.add('text-zinc-400');
            }
        }

        function signup(e) {
            e.preventDefault();
            const username = sanitizeInput(document.getElementById('signup-username').value.trim());
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;

            if (password !== confirm) {
                alert("Passwords don't match!");
                return;
            }
            if (password.length < 4) {
                alert("Password must be at least 4 characters");
                return;
            }

            let users = JSON.parse(localStorage.getItem('yangoUsers') || '[]');
            if (users.find(u => u.username === username)) {
                alert("Username already taken!");
                return;
            }

            // Store hashed password (not plain text)
            const hashedPassword = hashPassword(password);
            users.push({ username, password: hashedPassword, created: new Date().toISOString() });
            localStorage.setItem('yangoUsers', JSON.stringify(users));

            currentUser = { username };
            localStorage.setItem('yangoCurrentUser', JSON.stringify(currentUser));
            enterApp();
        }

        function login(e) {
            e.preventDefault();
            
            if (isLocked) {
                document.getElementById('login-error').innerHTML = "Too many attempts. Please wait 30 seconds.";
                document.getElementById('login-error').classList.remove('hidden');
                return;
            }

            const username = sanitizeInput(document.getElementById('login-username').value.trim());
            const password = document.getElementById('login-password').value;
            const hashedPassword = hashPassword(password);

            let users = JSON.parse(localStorage.getItem('yangoUsers') || '[]');
            const user = users.find(u => u.username === username && u.password === hashedPassword);

            if (!user) {
                loginAttempts++;
                const errorEl = document.getElementById('login-error');
                
                if (loginAttempts >= MAX_ATTEMPTS) {
                    isLocked = true;
                    errorEl.innerHTML = `Too many failed attempts. Locked for 30 seconds.`;
                    setTimeout(() => {
                        isLocked = false;
                        resetLoginAttempts();
                        errorEl.classList.add('hidden');
                    }, LOCK_TIME);
                } else {
                    errorEl.innerHTML = `Invalid credentials (${loginAttempts}/${MAX_ATTEMPTS})`;
                }
                errorEl.classList.remove('hidden');
                return;
            }

            // Successful login
            resetLoginAttempts();
            currentUser = { username };
            localStorage.setItem('yangoCurrentUser', JSON.stringify(currentUser));
            enterApp();
        }

        function enterApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('username-display').innerHTML = currentUser.username;
            loadData();
            updateDashboard();
        }

        // ==================== PROFILE ACTIONS (No more prompt) ====================
        function showProfile() {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50';
            modal.innerHTML = `
                <div class="bg-zinc-800 border border-zinc-700 rounded-3xl w-full max-w-xs p-6 mx-4">
                    <div class="text-center mb-4">
                        <div class="font-semibold text-lg">${currentUser.username}</div>
                        <div class="text-xs text-zinc-400">Logged in</div>
                    </div>
                    
                    <div class="space-y-2">
                        <button onclick="exportData(); closeModal(this)" 
                                class="w-full py-3 bg-zinc-700 hover:bg-zinc-600 rounded-2xl text-sm flex items-center justify-center gap-x-2">
                            <i class="fa-solid fa-download"></i> Export Data
                        </button>
                        
                        <button onclick="importData(); closeModal(this)" 
                                class="w-full py-3 bg-zinc-700 hover:bg-zinc-600 rounded-2xl text-sm flex items-center justify-center gap-x-2">
                            <i class="fa-solid fa-upload"></i> Import Backup
                        </button>
                        
                        <button onclick="changePassword(); closeModal(this)" 
                                class="w-full py-3 bg-zinc-700 hover:bg-zinc-600 rounded-2xl text-sm flex items-center justify-center gap-x-2">
                            <i class="fa-solid fa-key"></i> Change Password
                        </button>
                        
                        <button onclick="logout(); closeModal(this)" 
                                class="w-full py-3 bg-red-900 hover:bg-red-800 rounded-2xl text-sm flex items-center justify-center gap-x-2">
                            <i class="fa-solid fa-sign-out-alt"></i> Logout
                        </button>
                    </div>
                    
                    <button onclick="closeModal(this)" 
                            class="mt-4 w-full py-2 text-sm text-zinc-400">Cancel</button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function closeModal(element) {
            element.closest('.fixed').remove();
        }

        function logout() {
            localStorage.removeItem('yangoCurrentUser');
            location.reload();
        }

        // ==================== PASSWORD CHANGE (Secure) ====================
        function changePassword() {
            const currentPass = prompt("Enter your current password:");
            if (!currentPass) return;

            let users = JSON.parse(localStorage.getItem('yangoUsers') || '[]');
            const userIndex = users.findIndex(u => u.username === currentUser.username);
            
            const hashedCurrent = hashPassword(currentPass);
            if (!users[userIndex] || users[userIndex].password !== hashedCurrent) {
                alert("Incorrect current password!");
                return;
            }

            const newPass = prompt("Enter new password (min 4 characters):");
            if (!newPass || newPass.length < 4) {
                alert("Password must be at least 4 characters");
                return;
            }
            
            const confirmNew = prompt("Confirm new password:");
            if (newPass !== confirmNew) {
                alert("Passwords do not match!");
                return;
            }

            users[userIndex].password = hashPassword(newPass);
            localStorage.setItem('yangoUsers', JSON.stringify(users));
            alert("Password changed successfully!");
        }

        // ==================== EXPORT / IMPORT WITH VALIDATION ====================
        function exportData() {
            const data = {
                username: currentUser.username,
                exportedAt: new Date().toISOString(),
                entries: entries
            };
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], {type:'application/json'}));
            a.download = `yango-backup-${currentUser.username}.json`;
            a.click();
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            
            input.onchange = function(e) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const data = JSON.parse(event.target.result);
                        
                        // Security: Validate imported data
                        if (!validateImportData(data)) {
                            alert("Invalid or corrupted backup file");
                            return;
                        }
                        
                        entries = data.entries;
                        saveData();
                        updateDashboard();
                        alert("Data imported successfully!");
                    } catch (error) {
                        alert("Failed to import backup. File may be corrupted.");
                    }
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        }

        // ==================== DATA MANAGEMENT ====================
        let entries = [];
        let currentUser = null;

        function loadData() {
            if (!currentUser) return;
            const key = `yangoEntries_${currentUser.username}`;
            entries = JSON.parse(localStorage.getItem(key) || '[]');
        }

        function saveData() {
            if (!currentUser) return;
            const key = `yangoEntries_${currentUser.username}`;
            localStorage.setItem(key, JSON.stringify(entries));
        }

        // ==================== TRANSACTIONS WITH SANITIZATION ====================
        function addIncome(e) {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('income-amount').value);
            if (!amount) return;

            const notes = sanitizeInput(document.getElementById('income-notes').value);
            let incomeType = document.getElementById('type-personal').classList.contains('!border-blue-400') ? 'personal' : 'yango';

            entries.unshift({
                id: Date.now(),
                type: 'income',
                incomeType,
                amount,
                date: new Date().toISOString().split('T')[0],
                timestamp: new Date().toISOString(),
                notes
            });

            saveData();
            document.getElementById('income-form').reset();
            alert('Income saved!');
            showSection('dashboard');
        }

        function addExpense(e) {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('expense-amount').value);
            const category = document.getElementById('expense-category').value;
            const notes = sanitizeInput(document.getElementById('expense-notes').value);
            if (!amount || !category) return;

            entries.unshift({
                id: Date.now(),
                type: 'expense',
                category,
                amount,
                date: new Date().toISOString().split('T')[0],
                timestamp: new Date().toISOString(),
                notes
            });

            saveData();
            document.getElementById('expense-form').reset();
            alert('Expense saved!');
            showSection('dashboard');
        }

        // ==================== DASHBOARD & REPORTS ====================
        function updateDashboard() {
            const today = new Date().toISOString().split('T')[0];
            const todayEntries = entries.filter(e => e.date === today);

            let yango = 0, personal = 0, expenses = 0;
            todayEntries.forEach(e => {
                if (e.type === 'income') {
                    e.incomeType === 'yango' ? yango += e.amount : personal += e.amount;
                } else expenses += e.amount;
            });

            const net = yango + personal - expenses;

            document.getElementById('today-yango').innerHTML = yango.toLocaleString();
            document.getElementById('today-personal').innerHTML = personal.toLocaleString();
            document.getElementById('today-expenses').innerHTML = expenses.toLocaleString() + ' XAF';
            document.getElementById('today-net').innerHTML = (net >= 0 ? '' : '-') + Math.abs(net).toLocaleString();
        }

        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(section).classList.add('active');
            if (section === 'dashboard') updateDashboard();
        }

        function initialize() {
            const savedUser = localStorage.getItem('yangoCurrentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('username-display').innerHTML = currentUser.username;
                loadData();
                updateDashboard();
            }
            
            document.getElementById('today-date').innerHTML = new Date().toLocaleDateString('fr-FR', {month:'short', day:'numeric'});
        }

        window.onload = initialize;
    </script>
</body>
</html>
